<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon3 Global CRM</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <header class="bg-blue-900 text-white p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">Carbon3 Global <span class="text-blue-300 font-light text-lg">| Internal CRM</span></h1>
            <span class="bg-green-500 text-xs uppercase px-2 py-1 rounded font-semibold tracking-wider">System Live</span>
        </div>
    </header>

    <main class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold border-b pb-2 mb-4 text-gray-700">Add New Region</h2>
                <form id="regionForm" class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Region Name</label>
                        <input type="text" id="regionName" placeholder="e.g., LATAM, Global" class="w-full border p-2 rounded focus:outline-blue-500" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition">Create Territory</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-lg font-bold border-b pb-2 mb-4 text-gray-700">Move Distributor</h2>
                <form id="moveForm" class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Distributor ID</label>
                        <input type="number" id="distId" placeholder="e.g., 1" class="w-full border p-2 rounded focus:outline-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Target Region ID</label>
                        <input type="number" id="targetRegionId" placeholder="e.g., 1 (Global)" class="w-full border p-2 rounded focus:outline-blue-500" required>
                    </div>
                    <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium py-2 rounded transition">Update Assignment</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow">
            <div class="flex justify-between items-center border-b pb-2 mb-4">
                <h2 class="text-lg font-bold text-gray-700">Global Network Hierarchy Mapping</h2>
                <button onclick="fetchNetwork()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold text-xs px-3 py-1 rounded transition">🔄 Refresh Data</button>
            </div>
            
            <pre id="networkDisplay" class="bg-gray-900 text-green-400 p-4 rounded overflow-x-auto text-sm font-mono shadow-inner h-[400px]">Loading organizational hierarchy...</pre>
        </div>

    </main>

    <script>
        const API_URL = 'http://localhost:3000';

        // 1. Fetch and render the entire organizational mapping
        async function fetchNetwork() {
            try {
                const response = await fetch(`${API_URL}/network`);
                const data = await response.json();
                document.getElementById('networkDisplay').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('networkDisplay').textContent = "Failed to load network data.";
            }
        }

        // 2. Handle Region Submission
        document.getElementById('regionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regionName').value;
            
            const response = await fetch(`${API_URL}/regions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });

            if (response.ok) {
                alert(`Region "${name}" created successfully!`);
                document.getElementById('regionName').value = '';
                fetchNetwork();
            } else {
                alert("Error building region. It might already exist.");
            }
        });

        // 3. Handle Distributor Territorial Movement
        document.getElementById('moveForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('distId').value;
            const targetRegionId = document.getElementById('targetRegionId').value;

            const response = await fetch(`${API_URL}/distributors/${id}/move`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetRegionId })
            });

            if (response.ok) {
                alert("Distributor routing re-mapped successfully!");
                document.getElementById('distId').value = '';
                document.getElementById('targetRegionId').value = '';
                fetchNetwork();
            } else {
                alert("Failed to update distributor layout. Check your record IDs.");
            }
        });

        // Initial Load on page open
        fetchNetwork();
    </script>
</body>
</html>
